{% extends 'blotter_base.html' %}
{% load static %}

{% block title %}Enter OTP – BIMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-key-fill" style="font-size: 48px; color: #667eea;"></i>
                        <h4 class="mt-3">Enter Verification Code</h4>
                        <p class="text-muted">We sent a 6-digit code to your email</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">6-Digit OTP Code</label>
                            {{ form.otp_code }}
                            <div class="form-text">The code expires in 10 minutes</div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-lg me-2"></i> Verify
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <small>
                            Didn't receive the code? 
                            <a href="{% url 'blotter:blotter_verify_email' %}">Resend</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
